x-shared-app-config: &shared-app-config
  restart: unless-stopped
  env_file:
    - path: ./envs/core-services/shared.env
      required: false
    - ./.env
  networks:
    - app_network

x-shared-api-config: &shared-api-config
  <<: *shared-app-config
  env_file:
    - path: ./envs/core-services/shared.env
      required: false
    - path: ./envs/core-services/api.env
      required: false
    - path: ./envs/databases/postgres.env
      required: false
    - path: ./envs/databases/redis.env
      required: false
    - ./.env

services:
  api:
    <<: *shared-api-config
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: ${API_IMAGE:-dev-template-api:local}
    environment:
      APP_ENV: ${APP_ENV:-production}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app:app@postgres:5432/app}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${API_PORT:-5001}:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    <<: *shared-app-config
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: ${WEB_IMAGE:-dev-template-web:local}
    env_file:
      - path: ./envs/core-services/shared.env
        required: false
      - path: ./envs/core-services/web.env
        required: false
      - ./.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    profiles:
      - ""
      - postgresql
    restart: unless-stopped
    env_file:
      - ./envs/databases/postgres.env
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./envs/databases/redis.env
      - ./.env
    command: ["redis-server", "--appendonly", "${REDIS_APPENDONLY:-yes}"]
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  app_network:
    driver: bridge

